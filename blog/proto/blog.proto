syntax = "proto3";

package blog;

import "google/protobuf/empty.proto";

message Post {
  string id = 1;
  string author_id = 2;
  string title = 3;
  string content = 4;
}

message PostId {
  string id = 1;
}

service BlogService {
  rpc CreatePost(Post) returns (PostId) {}
  rpc ReadPost(PostId) returns (Post) {}
  rpc ReplacePost(Post) returns (Post) {}
  rpc UpdatePost(Post) returns (Post) {}
  rpc DeletePost(PostId) returns (google.protobuf.Empty) {}
  rpc ReadPosts(google.protobuf.Empty) returns (stream Post) {}
}